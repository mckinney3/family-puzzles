const found=new Set();
let selecting=false,startCell=null,currentPath=[],hintTimer=null;
const gridEl=document.getElementById("grid"),statusEl=document.getElementById("status"),overlay=document.getElementById("overlay"),boardWrap=document.getElementById("boardWrap");
function cellId(r,c){return "cell-"+r+"-"+c}
function renderGrid(){gridEl.innerHTML="";for(let r=0;r<SIZE;r++){for(let c=0;c<SIZE;c++){const div=document.createElement("div");div.className="cell";div.id=cellId(r,c);div.dataset.r=r;div.dataset.c=c;div.textContent=gridLetters[r][c];gridEl.appendChild(div)}}sizeOverlay()}
function sizeOverlay(){const rect=boardWrap.getBoundingClientRect();overlay.setAttribute("width",rect.width);overlay.setAttribute("height",rect.height);overlay.setAttribute("viewBox","0 0 "+rect.width+" "+rect.height)}
function renderWords(){const list=document.getElementById("words");list.innerHTML="";for(const w of words){const div=document.createElement("div");div.className="word";div.id="word-"+w.clean;div.textContent="☐ "+w.display;list.appendChild(div)}}
function clearHintMarks(){if(hintTimer)clearTimeout(hintTimer);document.querySelectorAll(".hintCell").forEach(e=>e.classList.remove("hintCell"));document.querySelectorAll(".hintWord").forEach(e=>e.classList.remove("hintWord"))}
function getCellFromPoint(x,y){const el=document.elementFromPoint(x,y);if(!el||!el.classList.contains("cell"))return null;return[parseInt(el.dataset.r),parseInt(el.dataset.c)]}
function pathBetween(a,b){if(!a||!b)return[];const[r1,c1]=a,[r2,c2]=b;const dr=Math.sign(r2-r1),dc=Math.sign(c2-c1),lenR=Math.abs(r2-r1),lenC=Math.abs(c2-c1);if(!(r1===r2||c1===c2||lenR===lenC))return[];const steps=Math.max(lenR,lenC),path=[];for(let i=0;i<=steps;i++)path.push([r1+dr*i,c1+dc*i]);return path}
function markSelected(path){document.querySelectorAll(".cell.selected").forEach(e=>e.classList.remove("selected"));for(const[r,c]of path)document.getElementById(cellId(r,c)).classList.add("selected")}
function sameCells(a,b){if(a.length!==b.length)return false;for(let i=0;i<a.length;i++)if(a[i][0]!==b[i][0]||a[i][1]!==b[i][1])return false;return true}
function checkPath(path){for(const w of words){if(found.has(w.clean))continue;const f=w.cells,b=[...w.cells].reverse();if(sameCells(path,f)||sameCells(path,b)){found.add(w.clean);markFound(w);statusEl.textContent="Found: "+w.display+"  ("+found.size+" of "+words.length+")";if(found.size===words.length)statusEl.textContent="Wonderful! You found every memory.";return true}}return false}
function markFound(w){clearHintMarks();for(const[r,c]of w.cells)document.getElementById(cellId(r,c)).classList.add("found");const wordEl=document.getElementById("word-"+w.clean);wordEl.classList.add("done");wordEl.textContent="☑ "+w.display;drawLine(w.cells)}
function pointerDown(e){clearHintMarks();const p=e.touches?e.touches[0]:e,cell=getCellFromPoint(p.clientX,p.clientY);if(!cell)return;selecting=true;startCell=cell;currentPath=[cell];markSelected(currentPath);e.preventDefault()}
function pointerMove(e){if(!selecting)return;const p=e.touches?e.touches[0]:e,end=getCellFromPoint(p.clientX,p.clientY);if(!end)return;const path=pathBetween(startCell,end);if(path.length){currentPath=path;markSelected(path)}e.preventDefault()}
function pointerUp(e){if(!selecting)return;selecting=false;if(!checkPath(currentPath))statusEl.textContent="Not on the list. Try again.";clearSelection(false);e.preventDefault()}
function clearSelection(update=true){document.querySelectorAll(".cell.selected").forEach(e=>e.classList.remove("selected"));currentPath=[];startCell=null;if(update)statusEl.textContent="Selection cleared."}
function cellCenter(r,c){const wrap=boardWrap.getBoundingClientRect(),el=document.getElementById(cellId(r,c)).getBoundingClientRect();return[el.left-wrap.left+el.width/2,el.top-wrap.top+el.height/2]}
function drawLine(cells){sizeOverlay();const[r1,c1]=cells[0],[r2,c2]=cells[cells.length-1],[x1,y1]=cellCenter(r1,c1),[x2,y2]=cellCenter(r2,c2);const line=document.createElementNS("http://www.w3.org/2000/svg","line");line.setAttribute("x1",x1);line.setAttribute("y1",y1);line.setAttribute("x2",x2);line.setAttribute("y2",y2);line.setAttribute("stroke","#111");line.setAttribute("stroke-width","4");line.setAttribute("stroke-linecap","round");line.setAttribute("opacity","0.95");overlay.appendChild(line)}
function redrawAllLines(){overlay.innerHTML="";requestAnimationFrame(()=>{sizeOverlay();for(const w of words){if(found.has(w.clean))drawLine(w.cells)}})}
function showHint(){clearHintMarks();const remaining=words.filter(w=>!found.has(w.clean));if(!remaining.length){statusEl.textContent="All memories have been found.";return}const w=remaining[0],[r,c]=w.cells[0],cell=document.getElementById(cellId(r,c));cell.classList.add("hintCell");const wordEl=document.getElementById("word-"+w.clean);if(wordEl)wordEl.classList.add("hintWord");cell.scrollIntoView({behavior:"smooth",block:"center",inline:"center"});statusEl.textContent="Hint: Start "+w.display+" on the bright yellow letter.";hintTimer=setTimeout(clearHintMarks,8000)}
function showSolution(){clearHintMarks();for(const w of words){if(!found.has(w.clean)){found.add(w.clean);for(const[r,c]of w.cells)document.getElementById(cellId(r,c)).classList.add("found");const wordEl=document.getElementById("word-"+w.clean);wordEl.classList.add("done");wordEl.textContent="☑ "+w.display}}redrawAllLines();statusEl.textContent="Solution shown."}
function resetPuzzle(){found.clear();clearHintMarks();overlay.innerHTML="";document.querySelectorAll(".cell").forEach(e=>e.className="cell");renderWords();statusEl.textContent="Puzzle reset. Drag across letters to select a memory."}
